# 腾讯文档值班打卡自动化工具配置文件
# 作者：dmf
# 时间：2026/4/16

[DOCUMENT]
# 腾讯文档表单链接
url = https://docs.qq.com/form/page/DS2Fna09jRFRhZkJj

[USER]
# 组别（如：2组）
group = 3组
# 昵称
nickname = Rumia888
# 组别+昵称组合（填写时使用）
display_name = 5组Rumia6666

[SCHEDULE]
# 勾选的值班时间段（可选值：09-12、12-15、15-18、18-21、21-24）
selected_slot = 21-24
# 签到执行时间（24小时制，格式：HH:MM）
sign_in_time = 08:54
# 签退执行时间
sign_out_time = 08:55

[BROWSER]
# 是否后台静默运行（true/false）
headless = true
# 登录数据保存目录（相对于程序目录）
user_data_dir = chrome_data
# 页面加载超时时间（秒）
timeout = 30

[RETRY]
# 最大重试次数
max_attempts = 3
# 重试间隔（秒）
retry_interval = 5

[LOG]
# 日志保存目录
log_dir = logs
# 日志级别（DEBUG/INFO/WARNING/ERROR）
log_level = INFO